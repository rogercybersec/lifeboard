name: "LifeBoard CI/CD Pipeline"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check index.html exists and is valid
        run: |
          if [ ! -f public/index.html ]; then
            echo "::error::public/index.html is missing!"
            exit 1
          fi
          FILE_SIZE=$(wc -c < public/index.html)
          echo "index.html size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 5000 ]; then
            echo "::error::index.html seems too small ($FILE_SIZE bytes)"
            exit 1
          fi
          echo "✅ index.html validated ($FILE_SIZE bytes)"

      - name: Check sw.js exists
        run: |
          if [ ! -f public/sw.js ]; then
            echo "::error::public/sw.js is missing!"
            exit 1
          fi
          echo "✅ sw.js present"

      - name: Check API routes exist
        run: |
          MISSING=0
          for route in api/gemini.js api/cron/check.js api/email/parse.js api/config.js; do
            if [ ! -f "$route" ]; then
              echo "::warning::Missing API route: $route"
              MISSING=$((MISSING + 1))
            fi
          done
          echo "API routes check: $MISSING missing"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hardcoded secrets
        run: |
          FOUND=0
          for pattern in 'AKIA[0-9A-Z]{16}' 'sk-[a-zA-Z0-9]{48}' 'ghp_[a-zA-Z0-9]{36}' 'AIza[0-9A-Za-z_-]{35}' '[0-9]{8,10}:[A-Za-z0-9_-]{35}'; do
            if grep -rnE "$pattern" public/ api/ 2>/dev/null; then
              echo "::error::Potential secret found matching $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "✅ No hardcoded secrets found"

      - name: Check for sensitive files
        run: |
          for f in .env .env.local .env.production credentials.json; do
            if [ -f "$f" ]; then
              echo "::error::Sensitive file committed: $f"
              exit 1
            fi
          done
          echo "✅ No sensitive files in repo"

  merge_gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: github.event_name == 'pull_request'
    steps:
      - name: All quality gates passed
        run: echo "✅ All quality gates passed. Safe to merge."

  deploy_check:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Verified
        run: |
          echo "============================================"
          echo "  ✅ ALL CHECKS PASSED — DEPLOY READY"
          echo "  Vercel auto-deploys this commit."
          echo "============================================"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate, security]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Determine result
        id: result
        run: |
          if [[ "${{ needs.validate.result }}" == "failure" ]]; then
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "detail=Validation failed" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "detail=Security scan failed — secrets detected" >> $GITHUB_OUTPUT
          else
            echo "status=✅ PASSED" >> $GITHUB_OUTPUT
            echo "detail=All checks passed — Vercel auto-deploying" >> $GITHUB_OUTPUT
          fi

      - name: Notify Telegram
        if: always()
        run: |
          MSG="🏦 LifeBoard ${{ steps.result.outputs.status }}
          ${{ steps.result.outputs.detail }}
          Branch: ${{ github.ref_name }}
          Commit: $(echo ${{ github.sha }} | cut -c1-7)"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" || echo "Telegram skipped"

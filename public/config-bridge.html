<!DOCTYPE html>
<html><head><title>LifeBoard Config</title>
<style>
body{background:#0c0e12;color:#14b8a6;font-family:system-ui;
display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;}
h1{font-size:2rem;margin-bottom:0.5rem;}
p{color:#8b919a;font-size:1rem;margin-top:0.5rem;}
.icon{font-size:3rem;margin-bottom:1rem;color:#2dd4bf;}
</style>
</head><body>
<div class="icon">&#10003;</div>
<h1>All Settings Configured</h1>
<p>Telegram + Gemini + Email Secret saved</p>
<p style="color:#555;margin-top:2rem;">Redirecting to LifeBoard...</p>
<script>
// Config values are set via the Settings page in the app
// This page is kept for backwards compatibility only
var params = new URLSearchParams(window.location.search);
if (params.get('tg_token') && params.get('tg_chat')) {
  localStorage.setItem('lifeboard_telegram', JSON.stringify({token: params.get('tg_token'), chatId: params.get('tg_chat')}));
}
if (params.get('gemini_key')) {
  localStorage.setItem('lifeboard_gemini_key', params.get('gemini_key'));
}
if (params.get('email_secret')) {
  localStorage.setItem('lifeboard_email_secret', params.get('email_secret'));
}
setTimeout(function(){ window.location.href = 'index.html'; }, 1500);
</script>
</body></html>
